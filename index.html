<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>jsClock</title>
  <meta http-equiv="refresh" content="21600"><!-- refresh every 6 hours -->

  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="site.webmanifest">

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="jsclock.css">
</head>
<body id="digital">
  <svg id="clock" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
    <g font-family="inherit">
      <text id="time-str" x="225" y="40" text-anchor="end" dominant-baseline="middle" font-size="85" fill="#ed0" font-weight="700">00:00</text>
      <text id="secs-str" x="230" y="25" text-anchor="begin" dominant-baseline="middle" font-size="55" fill="#eee" font-weight="700">00</text>
      <text id="hr12-str" x="230" y="65" text-anchor="begin" dominant-baseline="middle" font-size="35" fill="#858585" font-weight="400">am</text>
      <text id="date-str" x="0" y="105" font-size="32" fill="#09c" font-weight="400" textLength="300" lengthAdjust="spacingAndGlyphs">If you see this, it's broken!</text>
    </g>
    <g id="pomodoro" stroke="none">
      <rect id="p5" x="200" y="118" width="100" height="2" fill="#4e4e4e" visibility="hidden" />
      <rect id="p4" x="150" y="118" width="50" height="2" fill="#e94" visibility="hidden" />
      <rect id="p3" x="100" y="118" width="50" height="2" fill="#a35" visibility="hidden" />
      <rect id="p2" x="50" y="118" width="50" height="2" fill="#36b" visibility="hidden" />
      <rect id="p1" x="0" y="118" width="50" height="2" fill="#4d8" visibility="hidden" />
    </g>
  </svg>
  <div id="copyright">&copy; 2017-2025 Silvino Rodrigues | 
    <input type="checkbox" id="pomodoro-checkbox"><label for="pomodoro-checkbox">Pomodoro</label> |
    <input type="checkbox" id="analog-checkbox"><label for="analog-checkbox">Analog</label></div>
  <script src="jsclock.js"></script>
  <script>
    document.getElementById("analog-checkbox").addEventListener("change", function() {
      if (this.checked) {
        window.location.href = 'analog.html';
      }
    });
  </script>
</body>
</html>
